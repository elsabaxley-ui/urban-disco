<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body style="margin: 0; background: #000;">
<script>
const config = {
    type: Phaser.AUTO,
    width: 1000,
    height: 800,
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1500 }, debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

let player, jeep, platforms, hazards, cursors, levelText;
let currentLevel = 1;

new Phaser.Game(config);

function preload() {
    // High-Res Character Assets
    this.load.image('duck', 'https://upload.wikimedia.org/wikipedia/commons/4/48/Rubber_Duckies.png');
    this.load.image('jeep', 'https://purepng.com/public/uploads/large/purepng.com-jeep-wrangler-white-carcarvehicletransportationjeep-961524660333t3xsm.png');
    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
    this.load.image('lava', 'https://labs.phaser.io/assets/sprites/shmup-baddie.png'); 
}

function create() {
    setupLevel.call(this);
    cursors = this.input.keyboard.createCursorKeys();
    
    levelText = this.add.text(40, 40, 'LEVEL ' + currentLevel, { 
        fontSize: '64px', 
        fill: '#FFF', 
        fontStyle: 'bold',
        stroke: '#FF0000', 
        strokeThickness: 8 
    });
    levelText.setScrollFactor(0);
}

function setupLevel() {
    if (platforms) platforms.clear(true, true);
    if (hazards) hazards.clear(true, true);
    if (player) player.destroy();
    if (jeep) jeep.destroy();

    // Spider-Verse Style Background Tints
    const hue = (currentLevel * 45) % 360;
    this.cameras.main.setBackgroundColor(Phaser.Display.Color.HSLToColor(hue/360, 0.7, 0.1).color);

    platforms = this.physics.add.staticGroup();
    hazards = this.physics.add.staticGroup();

    // World grows taller and wider
    const worldWidth = 1500 + (currentLevel * 100);
    const worldHeight = 1000 + (currentLevel * 150);
    this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);

    // 1. Procedural Vertical Level Design
    let lastX = 100;
    let lastY = worldHeight - 150;

    // Starting Platform
    platforms.create(lastX, lastY, 'ground').setDisplaySize(400, 50).refreshBody();

    while (lastY > 200) {
        lastX += (Math.random() * 400) - 200; // Zig-zag movement
        lastY -= 180; // Consistent vertical climb

        // Keep platforms in bounds
        if (lastX < 200) lastX = 300;
        if (lastX > worldWidth - 200) lastX = worldWidth - 300;

        let p = platforms.create(lastX, lastY, 'ground').setDisplaySize(250, 40).refreshBody();
        p.setTint(Phaser.Display.Color.HSLToColor((hue+60)/360, 0.9, 0.6).color);

        // Add Spikes/Lava on some platforms
        if (currentLevel > 1 && Math.random() > 0.6) {
            let s = hazards.create(lastX + (Math.random()*50), lastY - 45, 'lava').setScale(1).setTint(0xff0000);
            s.body.setSize(30, 30);
        }
    }

    // 2. The Bottom is Lava
    for(let lx = 0; lx < worldWidth; lx += 120) {
        hazards.create(lx, worldHeight - 30, 'lava').setDisplaySize(150, 80).setTint(0xff0000).refreshBody();
    }

    // 3. The Character (The Duck)
    player = this.physics.add.sprite(150, worldHeight - 300, 'duck').setScale(0.15);
    player.setCollideWorldBounds(true);
    player.setDragX(1000); // Smoother stopping
    player.body.setSize(player.width * 0.6, player.height * 0.8);

    // 4. The Goal (The Jeep)
    jeep = this.physics.add.sprite(lastX, lastY - 120, 'jeep').setScale(0.4);
    
    // Physics Connections
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(jeep, platforms);
    this.physics.add.overlap(player, hazards, () => this.scene.restart(), null, this);
    this.physics.add.overlap(player, jeep, nextLevel, null, this);

    this.cameras.main.startFollow(player, true, 0.08, 0.08);
}

function update() {
    const speed = 350;
    const jumpForce = -900;

    // Movement & Character Flipping
    if (cursors.left.isDown) {
        player.setVelocityX(-speed);
        player.flipX = true;
        player.setAngle(-5); // Slight tilt when moving
    } else if (cursors.right.isDown) {
        player.setVelocityX(speed);
        player.flipX = false;
        player.setAngle(5);
    } else {
        player.setVelocityX(0);
        player.setAngle(0);
    }

    // Jumping with "Stretch" Effect
    if (cursors.up.isDown && player.body.touching.down) {
        player.setVelocityY(jumpForce);
        // Visual Stretch
        this.tweens.add({
            targets: player,
            scaleY: 0.2,
            scaleX: 0.1,
            duration: 100,
            yoyo: true,
            onComplete: () => { player.setScale(0.15); }
        });
    }

    // If falling fast, tilt the character down
    if (player.body.velocity.y > 0) {
        player.setAngle(player.body.velocity.y * 0.05);
    }
}

function nextLevel() {
    currentLevel++;
    if (currentLevel <= 20) {
        levelText.setText('LEVEL ' + currentLevel);
        this.scene.restart();
    } else {
        alert("YOU WON THE GAME!");
        currentLevel = 1;
        this.scene.restart();
    }
}
</script>
</body>
</html>
